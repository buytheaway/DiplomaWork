seed: 42
device: "cuda"
amp: true

data:
  train_dir: "data/casia_webface/train"
  val_dir: "data/casia_webface/val"
  pairs_file: "data/lfw/pairs.txt"
  lfw_dir: "data/lfw_aligned"
  num_workers: 4
  input_size: 112

model:
  arch: "ir50"
  embedding_dim: 512
  normalize: true

loss:
  type: "arcface"       # "arcface" or "adaface"
  margin: 0.5
  scale: 64.0

train:
  batch_size: 128
  epochs: 28
  log_interval: 100
  save_every: 4
  max_grad_norm: 5.0
  output_dir: "training/outputs"

optimizer:
  lr: 0.1
  weight_decay: 0.0005
  momentum: 0.9

scheduler:
  milestones: [8, 14, 20, 25]
  gamma: 0.1
