version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: biometric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/biometric
      INDEX_PATH: /app/data/index/current.faiss
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/data:/app/data
volumes:
  db_data:
