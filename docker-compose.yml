services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: biometric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        INSTALL_ML: "false"   # set to "true" to include torch/insightface/onnx
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/biometric
      INDEX_PATH: /app/data/index/current.faiss
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
      - ./training/outputs:/app/training/outputs:ro

volumes:
  db_data:
