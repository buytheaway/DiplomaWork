services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: biometric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 8

  backend:
    build:
      context: ./backend
      args:
        ML_BACKEND: onnx
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data
      - ./models:/app/models:ro
      - ./training/outputs:/app/training/outputs:ro
      - ./model_bundle:/app/model_bundle:ro

volumes:
  db_data:
